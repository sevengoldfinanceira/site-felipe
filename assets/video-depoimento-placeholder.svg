<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1600" role="img" aria-labelledby="title description">
  <title id="title">Espaco para depoimento em video</title>
  <desc id="description">Fundo azul com botao dourado de reproducao.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#031b3a"/>
      <stop offset="1" stop-color="#0f4e66"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#d9ad3f"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1600" fill="url(#bg)"/>
  <circle cx="450" cy="730" r="150" fill="none" stroke="#d9ad3f" stroke-width="8" opacity=".55"/>
  <circle cx="450" cy="730" r="118" fill="url(#gold)"/>
  <path d="M420 660 540 730 420 800Z" fill="#031b3a"/>
  <text x="450" y="980" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" font-weight="700" text-anchor="middle">DEPOIMENTO</text>
  <text x="450" y="1050" fill="#d9ad3f" font-family="Arial, sans-serif" font-size="38" text-anchor="middle">EDUCACADEMICO</text>
</svg>
